<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Иврит">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<title>Карточки иврита</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23534AB7'/%3E%3Ctext x='90' y='130' font-size='110' text-anchor='middle' fill='white' font-family='serif' font-weight='500'%3E%D7%90%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f5f0;
    --bg-tertiary: #edeae1;
    --text: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #8a8880;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --accent: #534AB7;
    --accent-bg: #EEEDFE;
    --success-bg: #EAF3DE;
    --success-text: #3B6D11;
    --success-border: #97C459;
    --warning-bg: #FAEEDA;
    --warning-text: #854F0B;
    --warning-border: #EF9F27;
    --danger-bg: #FCEBEB;
    --danger-text: #A32D2D;
    --danger-border: #E24B4A;
    --highlight-bg: #FAEEDA;
    --highlight-text: #633806;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-secondary: #26251f;
      --bg-tertiary: #35342d;
      --text: #ececec;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.14);
      --border-strong: rgba(255,255,255,0.28);
      --accent: #AFA9EC;
      --accent-bg: #2d2a4a;
      --success-bg: #1f3808;
      --success-text: #C0DD97;
      --success-border: #639922;
      --warning-bg: #3f2705;
      --warning-text: #FAC775;
      --warning-border: #BA7517;
      --danger-bg: #3d1010;
      --danger-text: #F7C1C1;
      --danger-border: #E24B4A;
      --highlight-bg: #3f2705;
      --highlight-text: #FAC775;
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px 32px;
  }

  h1 { font-size: 22px; font-weight: 500; margin: 0 0 16px; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 12px; }

  button {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 14px;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.12s, transform 0.06s;
    white-space: normal;
    line-height: 1.3;
  }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.danger {
    color: var(--danger-text);
    border-color: var(--danger-border);
  }
  button.ghost {
    border-color: transparent;
    color: var(--text-secondary);
  }
  button.icon {
    padding: 6px 10px;
    font-size: 16px;
    line-height: 1;
  }

  input[type="text"], textarea {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius-md);
    width: 100%;
  }
  textarea {
    min-height: 160px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    resize: vertical;
  }

  /* Deck list */
  .deck-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.12s;
  }
  @media (hover: hover) {
    .deck-card:hover { background: var(--bg-secondary); }
    button:hover { background: var(--bg-secondary); }
    button.primary:hover { filter: brightness(0.95); background: var(--accent); }
    button.ghost:hover { background: var(--bg-secondary); }
    .grade-again:hover, .grade-hard:hover, .grade-easy:hover { filter: brightness(0.96); }
  }
  .deck-main { flex: 1; min-width: 0; }
  .deck-name {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .deck-stats {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .progress-bar {
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-bar > div {
    height: 100%;
    background: #1D9E75;
    transition: width 0.3s;
  }
  .deck-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* Image box */
  .image-box {
    width: 100%;
    height: 200px;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .image-box > div { width: 70%; max-width: 260px; }
  .image-box svg { width: 100%; height: auto; display: block; }

  /* Flip card */
  .flip-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 20px 18px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    user-select: none;
  }
  .flip-card.clickable { cursor: pointer; }
  .flip-card .front-ru {
    font-size: 17px;
    line-height: 1.5;
  }
  .flip-card .front-he, .flip-card .back-he {
    font-size: 22px;
    line-height: 1.7;
    font-family: ui-serif, "Times New Roman", serif;
    direction: rtl;
  }
  .flip-card .back-ru {
    font-size: 17px;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .flip-card .back-he { margin-bottom: 10px; }
  .flip-card .translit {
    font-size: 13px;
    color: var(--text-tertiary);
    font-style: italic;
    margin-bottom: 6px;
  }
  .flip-card .dict-word {
    font-size: 13px;
    color: var(--text-tertiary);
    font-family: ui-serif, "Times New Roman", serif;
    direction: rtl;
  }
  .tap-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 10px;
  }
  .highlight {
    background: var(--highlight-bg);
    color: var(--highlight-text);
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .highlight-he { padding: 1px 8px; }

  /* Grade buttons grid */
  .grade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .grade-grid button {
    padding: 11px 8px;
    font-size: 14px;
    font-weight: 500;
  }
  .grade-again { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }
  .grade-hard  { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-border); }
  .grade-easy  { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }

  /* Controls row */
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .controls button { flex: 1; min-width: 0; }

  /* Header row for study view */
  .study-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .study-title {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .study-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  /* List view header */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 8px;
  }
  .list-header h1 { margin: 0; flex: 1; min-width: 0; }

  .deck-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .menu-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .menu-row button { flex: 1; min-width: 130px; font-size: 13px; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--bg);
    border-radius: var(--radius-lg);
    padding: 20px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 0.5px solid var(--border);
  }
  .modal h2 { margin-top: 0; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .modal .error {
    color: var(--danger-text);
    font-size: 13px;
    margin-top: 8px;
    min-height: 18px;
  }
  .modal .hint {
    color: var(--text-secondary);
    font-size: 13px;
    margin: 0 0 12px;
  }
  .modal label {
    display: block;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .file-row button { flex-shrink: 0; }
  .file-name {
    font-size: 12px;
    color: var(--text-tertiary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  /* Toast / status */
  #status {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
    min-height: 16px;
  }

  .confirm-inline {
    margin-top: 12px;
    padding: 12px;
    background: var(--danger-bg);
    border: 0.5px solid var(--danger-border);
    border-radius: var(--radius-md);
    text-align: center;
  }
  .confirm-inline .msg {
    font-size: 13px;
    color: var(--danger-text);
    margin-bottom: 8px;
  }
  .confirm-inline .btns {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    border: 0.5px dashed var(--border-strong);
    border-radius: var(--radius-md);
  }
  .empty-state .title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text);
  }
  .empty-state .sub {
    font-size: 13px;
  }

  .kbd-hint {
    display: none;
  }
  @media (min-width: 700px) {
    .kbd-hint { display: inline; color: var(--text-tertiary); font-size: 12px; margin-left: 6px; }
  }
</style>
</head>

// ============================================================
// ХРАНИЛИЩЕ
// ============================================================
const STORAGE_KEY = 'hebrew-flashcards-v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.decks)) return defaultData();
    return normalize(parsed);
  } catch (e) {
    console.error('Load failed:', e);
    return defaultData();
  }
}

function defaultData() {
  return {
    version: 1,
    type: "hebrew-decks-export",
    decks: JSON.parse(JSON.stringify(INITIAL_DECKS)),
    progress: {}
  };
}

function normalize(data) {
  if (!data.progress) data.progress = {};
  data.decks.forEach(d => {
    if (!d.id) d.id = genId('deck');
    if (!Array.isArray(d.cards)) d.cards = [];
    d.cards.forEach(c => { if (!c.id) c.id = genId('card'); });
  });
  return data;
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  } catch (e) {
    console.error('Save failed:', e);
    showStatus('Не удалось сохранить — память переполнена?', true);
  }
}

function genId(prefix) {
  return prefix + '-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}

// ============================================================
// СОСТОЯНИЕ ПРИЛОЖЕНИЯ
// ============================================================
let DATA = loadData();
let view = 'list';           // 'list' | 'study'
let activeDeckId = null;
let studyState = { order: [], idx: 0, showingBack: false };
let modal = null;            // { type, props } или null

function getDeck(id) { return DATA.decks.find(d => d.id === id); }
function getDeckProgress(id) {
  if (!DATA.progress[id]) DATA.progress[id] = { known: {}, direction: 'ru-he' };
  return DATA.progress[id];
}

// ============================================================
// ПОРЯДОК КАРТОЧЕК ДЛЯ ИЗУЧЕНИЯ
// ============================================================
function buildOrder(deck, p) {
  const arr = deck.cards.map(c => c.id);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  arr.sort((a, b) => (p.known[a] || 0) - (p.known[b] || 0));
  return arr;
}

// ============================================================
// ПОДСВЕТКА
// ============================================================
function highlightRu(text, hl) {
  if (!hl) return escapeHtml(text);
  const lower = text.toLowerCase();
  const i = lower.indexOf(hl.toLowerCase());
  if (i < 0) return escapeHtml(text);
  return escapeHtml(text.slice(0, i)) +
    `<span class="highlight">${escapeHtml(text.slice(i, i + hl.length))}</span>` +
    escapeHtml(text.slice(i + hl.length));
}

function renderHeParts(parts) {
  if (!Array.isArray(parts)) return escapeHtml(String(parts || ''));
  return parts.map(p => {
    if (typeof p === 'string') return escapeHtml(p);
    if (p && typeof p === 'object' && p.w) {
      return `<span class="highlight highlight-he">${escapeHtml(p.w)}</span>`;
    }
    return '';
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

// SVG считается доверенным: либо из встроенных данных, либо из JSON,
// который пользователь сам импортирует. Но базовая защита: запретим <script>.
function sanitizeSvg(svg) {
  if (typeof svg !== 'string') return '';
  return svg.replace(/<script[\s\S]*?<\/script>/gi, '')
            .replace(/\son\w+\s*=\s*"[^"]*"/gi, '')
            .replace(/\son\w+\s*=\s*'[^']*'/gi, '');
}

// ============================================================
// РЕНДЕР
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (view === 'list') app.innerHTML = renderList();
  else if (view === 'study') app.innerHTML = renderStudy();
  renderModal();
  attach();
}

function renderList() {
  const decks = DATA.decks;
  const deckHTML = decks.length === 0
    ? `<div class="empty-state">
        <div class="title">Колод пока нет</div>
        <div class="sub">Нажми «+ Колода», чтобы импортировать первую.</div>
      </div>`
    : `<div class="deck-list">${decks.map(renderDeckCard).join('')}</div>`;

  return `
    <div class="list-header">
      <h1>Колоды</h1>
      <button class="icon" data-action="add-deck" title="Добавить колоду">+ Колода</button>
    </div>

    ${deckHTML}

    <div class="menu-row">
      <button data-action="export-full">Экспорт + прогресс</button>
      <button data-action="export-template">Экспорт без прогресса</button>
      <button data-action="import">Импорт JSON…</button>
      <button data-action="copy-prompt">Промпт для Claude</button>
    </div>
    <div id="status"></div>
  `;
}

function renderDeckCard(d) {
  const p = getDeckProgress(d.id);
  let learned = 0, toReview = 0;
  d.cards.forEach(c => {
    const s = p.known[c.id] || 0;
    if (s >= 2) learned++;
    else if (s < 0) toReview++;
  });
  const total = d.cards.length;
  const pct = total === 0 ? 0 : Math.round((learned / total) * 100);
  const stats = total === 0
    ? 'пусто'
    : `${total} карт · изучено ${learned}${toReview > 0 ? ` · повторить ${toReview}` : ''}`;

  return `
    <div class="deck-card" data-action="open-deck" data-deck="${escapeHtml(d.id)}">
      <div class="deck-main">
        <div class="deck-name">${escapeHtml(d.name)}</div>
        <div class="deck-stats">${stats}</div>
        <div class="progress-bar"><div style="width: ${pct}%"></div></div>
      </div>
      <div class="deck-actions">
        <button class="icon ghost" data-action="add-card" data-deck="${escapeHtml(d.id)}" title="Добавить карточку">+</button>
        <button class="icon ghost" data-action="delete-deck" data-deck="${escapeHtml(d.id)}" title="Удалить колоду">✕</button>
      </div>
    </div>
  `;
}

function renderStudy() {
  const deck = getDeck(activeDeckId);
  if (!deck) { view = 'list'; return renderList(); }
  const p = getDeckProgress(deck.id);

  if (deck.cards.length === 0) {
    return `
      <div class="study-header">
        <button data-action="back-to-list">← Колоды</button>
        <div class="study-title">${escapeHtml(deck.name)}</div>
        <div style="width: 70px"></div>
      </div>
      <div class="empty-state">
        <div class="title">В колоде нет карточек</div>
        <div class="sub">Добавь карточки через «+ карточку» в списке колод.</div>
      </div>
    `;
  }

  // Гарантируем валидный order
  if (!studyState.order.length || studyState.idx >= studyState.order.length ||
      !studyState.order.every(id => deck.cards.some(c => c.id === id))) {
    studyState.order = buildOrder(deck, p);
    studyState.idx = 0;
    studyState.showingBack = false;
  }

  const cardId = studyState.order[studyState.idx];
  const c = deck.cards.find(x => x.id === cardId);
  if (!c) {
    studyState.order = buildOrder(deck, p);
    studyState.idx = 0;
    return renderStudy();
  }

  let learned = 0, toReview = 0;
  deck.cards.forEach(cc => {
    const s = p.known[cc.id] || 0;
    if (s >= 2) learned++;
    else if (s < 0) toReview++;
  });

  const frontHTML = p.direction === 'ru-he'
    ? `<div class="front-ru">${highlightRu(c.ru, c.ruHL)}</div>`
    : `<div class="front-he">${renderHeParts(c.he)}</div>`;

  const backHTML = p.direction === 'ru-he'
    ? `<div class="back-he">${renderHeParts(c.he)}</div>
       <div class="translit">${escapeHtml(c.translit || '')}</div>
       <div class="dict-word">${escapeHtml(c.word || '')}</div>`
    : `<div class="back-ru">${highlightRu(c.ru, c.ruHL)}</div>
       <div class="translit">${escapeHtml(c.translit || '')}</div>
       <div class="dict-word">${escapeHtml(c.word || '')}</div>`;

  return `
    <div class="study-header">
      <button data-action="back-to-list">← Колоды</button>
      <div class="study-title">${escapeHtml(deck.name)}</div>
      <button class="icon ghost danger" data-action="delete-card" data-card="${escapeHtml(c.id)}" title="Удалить карточку">✕</button>
    </div>

    <div class="study-meta">
      <span>Карточка ${studyState.idx + 1} / ${deck.cards.length}</span>
      <span>Изучено: ${learned} · Повторить: ${toReview}</span>
    </div>

    <div class="image-box">
      <div>${sanitizeSvg(c.svg || '')}</div>
    </div>

    <div class="flip-card ${studyState.showingBack ? '' : 'clickable'}" ${studyState.showingBack ? '' : 'data-action="flip"'}>
      ${studyState.showingBack ? backHTML : frontHTML}
      ${studyState.showingBack ? '' : '<div class="tap-hint">Нажми, чтобы увидеть перевод</div>'}
    </div>

    ${studyState.showingBack ? `
      <div class="grade-grid">
        <button class="grade-again" data-action="grade" data-grade="again">Не знал</button>
        <button class="grade-hard"  data-action="grade" data-grade="hard">Трудно</button>
        <button class="grade-easy"  data-action="grade" data-grade="easy">Легко</button>
      </div>
    ` : ''}

    <div class="controls">
      <button data-action="toggle-direction">${p.direction === 'ru-he' ? 'Показывать иврит' : 'Показывать русский'}</button>
      <button data-action="shuffle">Перемешать</button>
      <button class="danger" data-action="reset-deck">Сбросить</button>
    </div>

    <div id="status"></div>
  `;
}

// ============================================================
// ОБРАБОТЧИКИ
// ============================================================
function attach() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', onAction);
  });
}

function onAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  const deckId = el.dataset.deck;
  const cardId = el.dataset.card;

  switch (action) {
    case 'add-deck':        openModal('add-deck'); break;
    case 'add-card':        e.stopPropagation(); openModal('add-cards', { deckId }); break;
    case 'delete-deck':     e.stopPropagation(); openModal('delete-deck', { deckId }); break;
    case 'open-deck':       openDeck(deckId); break;
    case 'back-to-list':    view = 'list'; activeDeckId = null; render(); break;
    case 'flip':            studyState.showingBack = true; render(); break;
    case 'grade':           gradeCard(el.dataset.grade); break;
    case 'toggle-direction':toggleDirection(); break;
    case 'shuffle':         shuffleCurrent(); break;
    case 'reset-deck':      openModal('reset-deck', { deckId: activeDeckId }); break;
    case 'delete-card':     openModal('delete-card', { deckId: activeDeckId, cardId }); break;
    case 'export-full':     exportJSON(true); break;
    case 'export-template': exportJSON(false); break;
    case 'import':          openModal('import'); break;
    case 'copy-prompt':     copyPrompt(); break;
    case 'modal-close':     closeModal(); break;
  }
}

// ============================================================
// ДЕЙСТВИЯ
// ============================================================
function openDeck(id) {
  const deck = getDeck(id);
  if (!deck) return;
  activeDeckId = id;
  const p = getDeckProgress(id);
  studyState = { order: buildOrder(deck, p), idx: 0, showingBack: false };
  view = 'study';
  render();
}

function gradeCard(level) {
  const deck = getDeck(activeDeckId);
  const p = getDeckProgress(activeDeckId);
  const cardId = studyState.order[studyState.idx];
  const cur = p.known[cardId] || 0;
  if (level === 'again') p.known[cardId] = -1;
  else if (level === 'hard') p.known[cardId] = Math.max(cur, 1);
  else if (level === 'easy') p.known[cardId] = Math.max(cur + 1, 2);
  saveData();

  studyState.idx++;
  if (studyState.idx >= studyState.order.length) {
    studyState.order = buildOrder(deck, p);
    studyState.idx = 0;
    showStatus('Колода пройдена — приоритет сложным словам.');
  }
  studyState.showingBack = false;
  render();
}

function toggleDirection() {
  const p = getDeckProgress(activeDeckId);
  p.direction = p.direction === 'ru-he' ? 'he-ru' : 'ru-he';
  studyState.showingBack = false;
  saveData();
  render();
}

function shuffleCurrent() {
  const deck = getDeck(activeDeckId);
  const p = getDeckProgress(activeDeckId);
  studyState.order = buildOrder(deck, p);
  studyState.idx = 0;
  studyState.showingBack = false;
  render();
  showStatus('Колода перемешана');
}

function resetDeckProgress(id) {
  const p = getDeckProgress(id);
  p.known = {};
  saveData();
  if (view === 'study' && activeDeckId === id) {
    const deck = getDeck(id);
    studyState.order = buildOrder(deck, p);
    studyState.idx = 0;
    studyState.showingBack = false;
  }
  render();
  showStatus('Прогресс сброшен');
}

function deleteDeck(id) {
  DATA.decks = DATA.decks.filter(d => d.id !== id);
  delete DATA.progress[id];
  saveData();
  if (activeDeckId === id) { view = 'list'; activeDeckId = null; }
  render();
  showStatus('Колода удалена');
}

function deleteCard(deckId, cardId) {
  const deck = getDeck(deckId);
  if (!deck) return;
  deck.cards = deck.cards.filter(c => c.id !== cardId);
  const p = getDeckProgress(deckId);
  delete p.known[cardId];
  saveData();
  if (view === 'study' && activeDeckId === deckId) {
    studyState.order = studyState.order.filter(id => id !== cardId);
    if (studyState.idx >= studyState.order.length) studyState.idx = 0;
    studyState.showingBack = false;
  }
  render();
  showStatus('Карточка удалена');
}

// ============================================================
// МОДАЛКИ
// ============================================================
function openModal(type, props = {}) {
  modal = { type, props, error: '' };
  render();
}
function closeModal() {
  modal = null;
  render();
}

  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();
  if (!modal) return;

  let html = '';

      const deck = getDeck(modal.props.deckId);
      html = `
        <h2>Удалить колоду?</h2>

        <div class="modal-actions">
          <button data-action="modal-close">Отмена</button>
          <button class="danger" id="modal-confirm-del-deck">Удалить</button>
        </div>
      `;
      break;
    }
    case 'delete-card': {
      const deck = getDeck(modal.props.deckId);
      const card = deck?.cards.find(c => c.id === modal.props.cardId);
      html = `
        <h2>Удалить карточку?</h2>
        <p class="hint">Карточка «${escapeHtml(card?.word || '')}» будет удалена из колоды.</p>

          <button data-action="modal-close">Отмена</button>

      break;

      const deck = getDeck(modal.props.deckId);

        <h2>Добавить колоду</h2>

          <span id="modal-file-name" class="file-name"></span>

          <button class="primary" id="modal-confirm-add-deck">Добавить</button>
        </div>
      `;
      break;
    }
    case 'add-cards': {
      const deck = getDeck(modal.props.deckId);
      html = `
        <h2>Добавить карточки</h2>
        <p class="hint">В колоду «${escapeHtml(deck?.name || '')}». Вставь JSON-массив карточек или загрузи файл.</p>
        <div class="file-row">
          <button class="ghost" id="modal-file-btn">📁 Загрузить файл…</button>
          <span id="modal-file-name" class="file-name"></span>
        </div>
        <input type="file" id="modal-file-input" accept=".json,application/json" style="display:none">
        <textarea id="modal-textarea" placeholder='[{"word": "...", "ru": "...", "he": [...], ...}]'></textarea>
        <div class="error" id="modal-error"></div>
        <div class="modal-actions">
          <button data-action="modal-close">Отмена</button>
          <button class="primary" id="modal-confirm-add-cards">Добавить</button>
        </div>
      `;
      break;
    }
    case 'import': {
      html = `
        <h2>Импорт JSON</h2>
        <p class="hint">Вставь JSON или загрузи .json файл. Совпадающие колоды будут добавлены как новые копии.</p>
        <div class="file-row">
          <button class="ghost" id="modal-file-btn">📁 Загрузить файл…</button>
          <span id="modal-file-name" class="file-name"></span>
        </div>
        <input type="file" id="modal-file-input" accept=".json,application/json" style="display:none">
        <textarea id="modal-textarea" placeholder='{"version": 1, "type": "hebrew-decks-export", "decks": [...]}'></textarea>
        <label><input type="checkbox" id="modal-import-progress" checked> Импортировать прогресс, если он есть</label>
        <div class="error" id="modal-error"></div>
        <div class="modal-actions">
          <button data-action="modal-close">Отмена</button>
          <button class="primary" id="modal-confirm-import">Импорт</button>
        </div>
      `;
      break;
    }
  }

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `<div class="modal">${html}</div>`;
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.body.appendChild(backdrop);

  // Локальные обработчики модалок
  document.querySelectorAll('.modal [data-action]').forEach(el => {
    el.addEventListener('click', onAction);
  });

  const hook = (id, fn) => {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener('click', fn);
  };

  hook('modal-confirm-del-deck', () => { deleteDeck(modal.props.deckId); closeModal(); });
  hook('modal-confirm-del-card', () => { deleteCard(modal.props.deckId, modal.props.cardId); closeModal(); });
  hook('modal-confirm-reset',    () => { resetDeckProgress(modal.props.deckId); closeModal(); });
  hook('modal-confirm-add-deck', handleAddDeck);
  hook('modal-confirm-add-cards',handleAddCards);
  hook('modal-confirm-import',   handleImport);

  // Загрузка файла → в textarea
  const fileBtn = document.getElementById('modal-file-btn');
  const fileInput = document.getElementById('modal-file-input');
  if (fileBtn && fileInput) {
    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        showModalError('Файл слишком большой (> 10 МБ)');
        return;
      }
      try {
        const text = await file.text();
        const ta = document.getElementById('modal-textarea');
        if (ta) ta.value = text;
        const nameEl = document.getElementById('modal-file-name');
        if (nameEl) nameEl.textContent = file.name;
        showModalError('');
      } catch (err) {
        showModalError('Не удалось прочитать файл: ' + err.message);
      }
    });
  }
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  if (el) el.textContent = msg;
}

// ============================================================
// ВАЛИДАЦИЯ И ИМПОРТ
// ============================================================
function validateCard(c, idx) {
  const prefix = `Карточка #${idx + 1}: `;
  if (!c || typeof c !== 'object') throw new Error(prefix + 'не объект');
  if (typeof c.ru !== 'string' || !c.ru.trim()) throw new Error(prefix + 'нет поля "ru"');
  if (!Array.isArray(c.he)) throw new Error(prefix + '"he" должно быть массивом');
  c.he.forEach((p, i) => {
    if (typeof p !== 'string' && !(p && typeof p === 'object' && typeof p.w === 'string')) {
      throw new Error(prefix + `he[${i}] — неверный формат (строка или {w:"..."})`);
    }
  });
  if (!c.id) c.id = genId('card');
  if (typeof c.word !== 'string') c.word = '';
  if (typeof c.ruHL !== 'string') c.ruHL = '';
  if (typeof c.translit !== 'string') c.translit = '';
  if (typeof c.svg !== 'string') c.svg = '';
  return c;
}

function validateDeck(d) {
  if (!d || typeof d !== 'object') throw new Error('Колода не объект');
  if (typeof d.name !== 'string' || !d.name.trim()) throw new Error('Нет имени колоды');
  if (!Array.isArray(d.cards)) throw new Error('Нет массива "cards"');
  d.cards.forEach(validateCard);
  if (!d.id) d.id = genId('deck');
  return d;
}

function handleAddDeck() {
  const raw = document.getElementById('modal-textarea').value.trim();
  if (!raw) return showModalError('Пусто');
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { return showModalError('Некорректный JSON: ' + e.message); }

  try {
    let deckObj;
    if (parsed.decks && Array.isArray(parsed.decks) && parsed.decks.length > 0) {
      // Полный экспорт — берём первую колоду
      deckObj = parsed.decks[0];
    } else {
      deckObj = parsed;
    }
    validateDeck(deckObj);
    // ID обязательно новый, чтобы не конфликтовать
    deckObj.id = genId('deck');
    deckObj.cards.forEach(c => { c.id = genId('card'); });
    DATA.decks.push(deckObj);
    saveData();
    closeModal();
    showStatus(`Колода «${deckObj.name}» добавлена`);
  } catch (e) {
    showModalError(e.message);
  }
}

function handleAddCards() {
  const raw = document.getElementById('modal-textarea').value.trim();
  if (!raw) return showModalError('Пусто');
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { return showModalError('Некорректный JSON: ' + e.message); }

  const cards = Array.isArray(parsed) ? parsed : [parsed];
  try {
    cards.forEach((c, i) => validateCard(c, i));
  } catch (e) {
    return showModalError(e.message);
  }

  const deck = getDeck(modal.props.deckId);
  cards.forEach(c => { c.id = genId('card'); deck.cards.push(c); });
  saveData();
  closeModal();
  showStatus(`Добавлено карточек: ${cards.length}`);
}

function handleImport() {
  const raw = document.getElementById('modal-textarea').value.trim();
  const importProgress = document.getElementById('modal-import-progress').checked;
  if (!raw) return showModalError('Пусто');
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { return showModalError('Некорректный JSON: ' + e.message); }

  if (!Array.isArray(parsed.decks)) return showModalError('Нет массива "decks"');

  try {
    parsed.decks.forEach(validateDeck);
  } catch (e) {
    return showModalError(e.message);
  }

  let count = 0;
  parsed.decks.forEach(d => {
    const oldId = d.id;
    const newId = genId('deck');   // всегда как новая (по выбору пользователя)
    const idMap = {};
    d.cards.forEach(c => {
      const newCardId = genId('card');
      idMap[c.id] = newCardId;
      c.id = newCardId;
    });
    d.id = newId;
    DATA.decks.push(d);

    if (importProgress && parsed.progress && parsed.progress[oldId]) {
      const oldProg = parsed.progress[oldId];
      DATA.progress[newId] = {
        direction: oldProg.direction || 'ru-he',
        known: {}
      };
      Object.keys(oldProg.known || {}).forEach(oldCardId => {
        if (idMap[oldCardId]) {
          DATA.progress[newId].known[idMap[oldCardId]] = oldProg.known[oldCardId];
        }
      });
    }
    count++;
  });
  saveData();
  closeModal();
  showStatus(`Импортировано колод: ${count}`);
}

// ============================================================
// ЭКСПОРТ
// ============================================================
function exportJSON(withProgress) {
  const payload = {
    version: 1,
    type: 'hebrew-decks-export',
    exportedAt: new Date().toISOString(),
    decks: JSON.parse(JSON.stringify(DATA.decks))
  };
  if (withProgress) payload.progress = JSON.parse(JSON.stringify(DATA.progress));

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = withProgress
    ? `hebrew-decks-full-${stamp}.json`
    : `hebrew-decks-template-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus(withProgress ? 'Экспортировано с прогрессом' : 'Экспортирован шаблон');
}

// ============================================================
// ПРОМПТ ДЛЯ CLAUDE
// ============================================================
const CLAUDE_PROMPT = `Я учу иврит (родной — русский). Сгенерируй JSON одной колоды для моего приложения карточек. Формат — строго как ниже.

ФОРМАТ:
{
  "name": "<название колоды, короткое>",
  "cards": [
    {
      "word": "<словарная форма на иврите с огласовками> (<русский перевод>)",
      "ru": "<короткое предложение 5–10 слов по-русски, в котором используется слово>",
      "ruHL": "<точная форма слова, как она стоит в ru — для подсветки>",
      "he": [
        "<часть предложения на иврите ДО ключевого слова, с огласовками>",
        { "w": "<ключевое слово в той форме, в какой оно в предложении, с огласовками>" },
        "<часть ПОСЛЕ ключевого слова>"
      ],
      "translit": "<транслитерация предложения латиницей с ударениями (как yesh lo ófi shakét meód)>",
      "svg": "<SVG-иллюстрация viewBox=\\"0 0 200 140\\", плоский стиль, 2–3 цвета из палитры, без shadow/gradient/blur, только solid fills, размер файла маленький>"
    }
  ]
}

ПРАВИЛА:
- Всегда добавляй огласовки (никуд) к иврит-тексту и словарной форме.
- Если слово в предложении стоит в изменённой форме (глагол в прошедшем, существительное во мн.ч. и т.п.) — ключ "w" содержит именно эту форму, а "word" — словарную.
- Предложения простые, бытовые, уровень А2–B1.
- SVG: 200x140, плоские фигуры, цвета из палитры #CECBF6/#534AB7/#FAC775/#EF9F27/#F5C4B3/#993C1D/#85B7EB/#0C447C/#9FE1CB/#0F6E56/#D3D1C7/#5F5E5A. Без теней, без градиентов, без <script>, без обработчиков событий.
- Не добавляй поле "id" — приложение сгенерирует само.
- Верни только JSON, без пояснений, без \`\`\`-обёрток.

СЛОВА (каждое с одного на строку, формат "русский перевод — иврит с огласовками"):

<сюда вставлю список слов>
`;

async function copyPrompt() {
  try {
    await navigator.clipboard.writeText(CLAUDE_PROMPT);
    showStatus('Промпт скопирован — вставь его в новый чат и допиши список слов внизу');
  } catch (e) {
    // fallback: показать в модалке, чтобы можно было выделить вручную
    modal = { type: 'show-prompt', props: {} };
    render();
    // подменим рендер модалки на лету
    const backdrop = document.querySelector('.modal-backdrop');
    if (backdrop) {
      backdrop.querySelector('.modal').innerHTML = `
        <h2>Скопируй промпт</h2>
        <p class="hint">Автоматически скопировать не получилось, выдели и скопируй вручную.</p>
        <textarea readonly>${escapeHtml(CLAUDE_PROMPT)}</textarea>
        <div class="modal-actions"><button data-action="modal-close">Закрыть</button></div>
      `;
      backdrop.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', onAction));
    }
  }
}

// ============================================================
// СТАТУС-БАР
// ============================================================
let statusTimer = null;
function showStatus(msg, isError) {
  const el = document.getElementById('status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger-text)' : 'var(--text-tertiary)';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { if (el) el.textContent = ''; }, 3000);
}

// ============================================================
// СТАРТ
// ============================================================
render();
